name: release
on:
  push:
    tags:
      # v1.0.0
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build
        run: ./gradlew shadowJar

      - name: Get version
        id: version
        run: echo "version=$(./gradlew properties -q | grep '^version:' | cut -d' ' -f2)" >> $GITHUB_OUTPUT

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          path: build/libs/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: FateCasino ${{ steps.version.outputs.version }}
          files: build/libs/*.jar
          generate_release_notes: true